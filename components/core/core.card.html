<!-- @dsCard group="Components" viewport="700x580" name="Core UI" subtitle="Buttons · Badges · Inputs · Avatars · Tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--color-bg-base);padding:20px}
    .sec{margin-bottom:20px}
    .lbl{font-size:var(--text-2xs);font-weight:var(--font-semibold);color:var(--color-text-muted);letter-spacing:var(--tracking-widest);text-transform:uppercase;margin-bottom:10px}
    .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .col{display:flex;flex-direction:column;gap:8px}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.BonsAIDesignSystem_9e0b99;
const { Button, Badge, Input, Avatar, Tag, Card } = NS;

function CoreShowcase() {
  const [v, setV] = React.useState('');
  return (
    <div>
      <div className="sec">
        <div className="lbl">Buttons — variants</div>
        <div className="row">
          <Button variant="primary">Primary</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="soft">Soft</Button>
          <Button variant="danger">Danger</Button>
          <Button variant="primary" loading>Loading</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row" style={{marginTop:8}}>
          <Button variant="primary" size="xs">XSmall</Button>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
          <Button variant="secondary" size="lg">Secondary lg</Button>
          <Button variant="soft" size="lg">Soft lg</Button>
        </div>
      </div>

      <div className="sec">
        <div className="lbl">Badges</div>
        <div className="row">
          {[['green','Active'],['sage','Brand'],['gold','Streak'],['terra','Stress'],['lavender','Sleep'],['sky','Focus'],['earth','Default'],['dark','Dark'],['great','Amazing'],['okay','Okay'],['stressed','Rough']].map(([c,l])=>(
            <Badge key={c} color={c} dot>{l}</Badge>
          ))}
        </div>
      </div>

      <div className="sec">
        <div className="lbl">Inputs</div>
        <div className="row" style={{alignItems:'flex-start'}}>
          <div style={{width:200}}>
            <Input label="How are you feeling?" placeholder="Describe your day…" value={v} onChange={e=>setV(e.target.value)} />
          </div>
          <div style={{width:200}}>
            <Input label="Sleep hours" type="number" placeholder="7.5" helper="Hours slept last night" />
          </div>
          <div style={{width:200}}>
            <Input label="Email" placeholder="you@school.edu" error="Please enter a valid email" />
          </div>
        </div>
      </div>

      <div className="sec">
        <div className="lbl">Avatars — sizes &amp; wellness rings</div>
        <div className="row">
          <Avatar name="Alex Chen" size="xs" />
          <Avatar name="Alex Chen" size="sm" />
          <Avatar name="Alex Chen" size="md" />
          <Avatar name="Alex Chen" size="lg" />
          <Avatar name="Alex Chen" size="xl" />
          <div style={{width:1,height:32,background:'var(--color-border)',margin:'0 4px'}}/>
          <Avatar name="Alex Chen" size="lg" showRing wellnessColor="great" />
          <Avatar name="Alex Chen" size="lg" showRing wellnessColor="okay" />
          <Avatar name="Alex Chen" size="lg" showRing wellnessColor="stressed" />
          <Avatar name="Taylor Smith" size="lg" showRing wellnessColor="lavender" />
        </div>
      </div>

      <div className="sec">
        <div className="lbl">Tags</div>
        <div className="row">
          <Tag color="green">Wellness</Tag>
          <Tag color="gold">Achievement</Tag>
          <Tag color="lavender">Sleep</Tag>
          <Tag color="sky">Focus</Tag>
          <Tag color="terra">Stress</Tag>
          <Tag color="earth">Habit</Tag>
          <Tag color="green" active>Active</Tag>
          <Tag color="green" removable onRemove={()=>{}}>Removable</Tag>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CoreShowcase />);
</script>
</body>
</html>
