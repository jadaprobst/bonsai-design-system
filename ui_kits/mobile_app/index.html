<!-- @dsCard group="Mobile App" viewport="430x900" name="BonsAI App" subtitle="Home · Today · Check-in · BonsAI Chat · Insights — interactive prototype" -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BonsAI — Mobile App</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080612;
      font-family: 'DM Sans', system-ui, sans-serif;
      padding: 24px 16px;
    }
    @keyframes bonsai-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Hide range input default styling */
    input[type=range] { -webkit-appearance: none; }
    /* Hide scrollbars */
    ::-webkit-scrollbar { width: 0; background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="./ios-frame.jsx"></script>
  <script type="text/babel" src="./AppCoreComponents.jsx"></script>
  <script type="text/babel" src="./AppGameComponents.jsx"></script>
  <script type="text/babel" src="./AppShared.jsx"></script>
  <script type="text/babel" src="./HomeScreen.jsx"></script>
  <script type="text/babel" src="./CheckInScreen.jsx"></script>
  <script type="text/babel" src="./TodayScreen.jsx"></script>
  <script type="text/babel" src="./ChatScreen.jsx"></script>
  <script type="text/babel" src="./InsightsScreen.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { IOSDevice } = window;
const { HomeScreen, CheckInScreen, TodayScreen, ChatScreen, InsightsScreen } = window;

function App() {
  const [screen, setScreen] = React.useState('home');
  const nav = (s) => setScreen(s);

  return (
    <IOSDevice title="BonsAI" dark>
      {screen === 'home'     && <HomeScreen     nav={nav} />}
      {screen === 'today'    && <TodayScreen    nav={nav} />}
      {screen === 'checkin'  && <CheckInScreen  nav={nav} />}
      {screen === 'chat'     && <ChatScreen     nav={nav} />}
      {screen === 'insights' && <InsightsScreen nav={nav} />}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
