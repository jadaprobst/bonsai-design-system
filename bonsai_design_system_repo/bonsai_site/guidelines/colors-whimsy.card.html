<!-- @dsCard group="Colors" viewport="700x280" name="Violet · Ocean · Indigo" subtitle="Whimsy palette — Self (violet) · Character (ocean) · Relationships (indigo)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:16px;font-family:var(--font-sans)}
    .grp{margin-bottom:12px}
    .grp-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
    .row{display:flex;gap:4px}
    .sw{flex:1;display:flex;flex-direction:column;gap:4px}
    .c{height:48px;border-radius:6px}
    .n{font-size:8px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  </style>
</head>
<body>
<div class="grp">
  <div class="grp-lbl" style="color:var(--color-violet-600)">Violet — Self · creativity · inner journey</div>
  <div class="row">
    <div class="sw"><div class="c" style="background:var(--color-violet-50)"></div><div class="n" style="color:var(--color-text-muted)">50</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-100)"></div><div class="n" style="color:var(--color-text-muted)">100</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-200)"></div><div class="n" style="color:var(--color-text-muted)">200</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-300)"></div><div class="n" style="color:var(--color-text-muted)">300</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-400)"></div><div class="n" style="color:var(--color-text-muted)">400</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-500);outline:2px solid var(--color-violet-700);outline-offset:2px"></div><div class="n" style="color:var(--color-violet-700)">500 ★</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-600)"></div><div class="n" style="color:var(--color-text-muted)">600</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-700)"></div><div class="n" style="color:var(--color-text-muted)">700</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-800)"></div><div class="n" style="color:var(--color-text-muted)">800</div></div>
    <div class="sw"><div class="c" style="background:var(--color-violet-900)"></div><div class="n" style="color:var(--color-text-muted)">900</div></div>
  </div>
</div>
<div class="grp">
  <div class="grp-lbl" style="color:var(--color-ocean-700)">Ocean — Character · authenticity · clarity</div>
  <div class="row">
    <div class="sw"><div class="c" style="background:var(--color-ocean-50)"></div><div class="n" style="color:var(--color-text-muted)">50</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-100)"></div><div class="n" style="color:var(--color-text-muted)">100</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-200)"></div><div class="n" style="color:var(--color-text-muted)">200</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-300)"></div><div class="n" style="color:var(--color-text-muted)">300</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-400)"></div><div class="n" style="color:var(--color-text-muted)">400</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-500);outline:2px solid var(--color-ocean-700);outline-offset:2px"></div><div class="n" style="color:var(--color-ocean-700)">500 ★</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-600)"></div><div class="n" style="color:var(--color-text-muted)">600</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-700)"></div><div class="n" style="color:var(--color-text-muted)">700</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-800)"></div><div class="n" style="color:var(--color-text-muted)">800</div></div>
    <div class="sw"><div class="c" style="background:var(--color-ocean-900)"></div><div class="n" style="color:var(--color-text-muted)">900</div></div>
  </div>
</div>
<div class="grp">
  <div class="grp-lbl" style="color:var(--color-indigo-600)">Indigo — Relationships · connection · trust</div>
  <div class="row">
    <div class="sw"><div class="c" style="background:var(--color-indigo-50)"></div><div class="n" style="color:var(--color-text-muted)">50</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-100)"></div><div class="n" style="color:var(--color-text-muted)">100</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-200)"></div><div class="n" style="color:var(--color-text-muted)">200</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-300)"></div><div class="n" style="color:var(--color-text-muted)">300</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-400)"></div><div class="n" style="color:var(--color-text-muted)">400</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-500);outline:2px solid var(--color-indigo-700);outline-offset:2px"></div><div class="n" style="color:var(--color-indigo-700)">500 ★</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-600)"></div><div class="n" style="color:var(--color-text-muted)">600</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-700)"></div><div class="n" style="color:var(--color-text-muted)">700</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-800)"></div><div class="n" style="color:var(--color-text-muted)">800</div></div>
    <div class="sw"><div class="c" style="background:var(--color-indigo-900)"></div><div class="n" style="color:var(--color-text-muted)">900</div></div>
  </div>
</div>
</body>
</html>
