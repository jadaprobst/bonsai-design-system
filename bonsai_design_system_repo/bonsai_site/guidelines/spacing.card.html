<!-- @dsCard group="Spacing" viewport="700x280" name="Spacing Scale" subtitle="4px base grid — xs through 3xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:20px;font-family:var(--font-sans)}
    .row{display:flex;flex-direction:column;gap:8px}
    .item{display:flex;align-items:center;gap:12px}
    .bar-wrap{flex:1;height:20px;display:flex;align-items:center}
    .bar{height:10px;background:var(--color-green-400);border-radius:3px;min-width:2px;transition:width .3s}
    .label{font-size:var(--text-xs);font-family:var(--font-mono);color:var(--color-text-secondary);min-width:90px;flex-shrink:0}
    .val{font-size:var(--text-xs);color:var(--color-text-muted);min-width:48px;flex-shrink:0;text-align:right}
  </style>
</head>
<body>
<div class="row">
  <div class="item"><div class="label">--space-1 (xs-)</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><div class="val">4px</div></div>
  <div class="item"><div class="label">--space-2 (xs)</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><div class="val">8px</div></div>
  <div class="item"><div class="label">--space-3 (sm)</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><div class="val">12px</div></div>
  <div class="item"><div class="label">--space-4 (md)</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><div class="val">16px</div></div>
  <div class="item"><div class="label">--space-5</div><div class="bar-wrap"><div class="bar" style="width:20px"></div></div><div class="val">20px</div></div>
  <div class="item"><div class="label">--space-6 (lg)</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><div class="val">24px</div></div>
  <div class="item"><div class="label">--space-8 (xl)</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><div class="val">32px</div></div>
  <div class="item"><div class="label">--space-10</div><div class="bar-wrap"><div class="bar" style="width:40px"></div></div><div class="val">40px</div></div>
  <div class="item"><div class="label">--space-12 (2xl)</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><div class="val">48px</div></div>
  <div class="item"><div class="label">--space-16 (3xl)</div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><div class="val">64px</div></div>
  <div class="item"><div class="label">--space-20</div><div class="bar-wrap"><div class="bar" style="width:80px"></div></div><div class="val">80px</div></div>
  <div class="item"><div class="label">--space-24</div><div class="bar-wrap"><div class="bar" style="width:96px"></div></div><div class="val">96px</div></div>
</div>
</body>
</html>
