<!-- @dsCard group="Brand" viewport="700x240" name="Logo" subtitle="BonsAI wordmark · tree icon + Fraunces + DM Sans" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--color-bg-base);color:var(--color-text-primary)}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;height:240px}
    .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:12px}
    .cell-light{background:var(--color-bg-base)}
    .cell-alt{background:var(--color-bg-surface)}
    .cell-dark{background:var(--color-bg-inset)}
    .label{font-size:9px;color:var(--color-text-muted);font-family:var(--font-mono);text-align:center;letter-spacing:.06em}
  </style>
</head>
<body>
<div class="grid">

  <!-- Light wordmark (on dark base) -->
  <div class="cell cell-light">
    <svg viewBox="0 0 240 64" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="BonsAI">
      <defs>
        <linearGradient id="trunkLight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7048a8;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4a2878;stop-opacity:1" />
        </linearGradient>
      </defs>
      <g transform="translate(4, 6) scale(0.65)">
        <rect x="40" y="88" width="40" height="8" rx="4" fill="#2d1f50" opacity="0.8"/>
        <path d="M42 96 L36 108 L84 108 L78 96 Z" fill="#1a1230"/>
        <ellipse cx="60" cy="88" rx="16" ry="5" fill="#3d2560" opacity="0.7"/>
        <path d="M58 88 Q56 70 54 52 Q52 40 55 28" stroke="url(#trunkLight)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M54 64 Q40 55 28 46" stroke="#52c4a8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
        <path d="M56 56 Q70 46 82 38" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
        <path d="M54 42 Q38 32 26 20" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
        <ellipse cx="60" cy="28" rx="18" ry="22" fill="#f0bb70" opacity="0.85"/>
        <ellipse cx="50" cy="18" rx="12" ry="14" fill="#fbbf24" opacity="0.8"/>
        <ellipse cx="68" cy="20" rx="14" ry="16" fill="#f0bb70" opacity="0.8"/>
        <circle cx="60" cy="12" r="6" fill="#fde68a" opacity="0.9"/>
        <ellipse cx="32" cy="22" rx="14" ry="18" fill="#a78bfa" opacity="0.8"/>
        <circle cx="26" cy="14" r="5" fill="#c4b5fd" opacity="0.85"/>
        <circle cx="38" cy="10" r="4" fill="#ddd6fe" opacity="0.8"/>
        <ellipse cx="28" cy="50" rx="12" ry="14" fill="#52c4a8" opacity="0.8"/>
        <circle cx="22" cy="44" r="4" fill="#6ee7b7" opacity="0.8"/>
        <ellipse cx="82" cy="42" rx="13" ry="15" fill="#60a5fa" opacity="0.8"/>
        <circle cx="88" cy="36" r="5" fill="#93c5fd" opacity="0.8"/>
      </g>
      <text x="80" y="44">
        <tspan font-family="'Fraunces', Georgia, serif" font-size="38" font-weight="400" fill="#0e0b1a">Bons</tspan><tspan font-family="'DM Sans', sans-serif" font-size="34" font-weight="600" fill="#a78bfa">AI</tspan>
      </text>
    </svg>
    <div class="label">wordmark · default</div>
  </div>

  <!-- Dark wordmark (on dark inset) -->
  <div class="cell cell-dark">
    <svg viewBox="0 0 240 64" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="BonsAI">
      <defs>
        <linearGradient id="trunkDark" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#c4a76d;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#a0916f;stop-opacity:1" />
        </linearGradient>
      </defs>
      <g transform="translate(4, 6) scale(0.65)">
        <rect x="40" y="88" width="40" height="8" rx="4" fill="#3d3270" opacity="0.9"/>
        <path d="M42 96 L36 108 L84 108 L78 96 Z" fill="#2d2550"/>
        <ellipse cx="60" cy="88" rx="16" ry="5" fill="#4a3a80" opacity="0.8"/>
        <path d="M58 88 Q56 70 54 52 Q52 40 55 28" stroke="url(#trunkDark)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M54 64 Q40 55 28 46" stroke="#6ee7b7" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="M56 56 Q70 46 82 38" stroke="#93c5fd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
        <path d="M54 42 Q38 32 26 20" stroke="#c4b5fd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
        <ellipse cx="60" cy="28" rx="18" ry="22" fill="#fbbf24" opacity="0.9"/>
        <ellipse cx="50" cy="18" rx="12" ry="14" fill="#fde68a" opacity="0.85"/>
        <ellipse cx="68" cy="20" rx="14" ry="16" fill="#fbbf24" opacity="0.85"/>
        <circle cx="60" cy="12" r="6" fill="#fef3c7" opacity="0.95"/>
        <ellipse cx="32" cy="22" rx="14" ry="18" fill="#c4b5fd" opacity="0.85"/>
        <circle cx="26" cy="14" r="5" fill="#ddd6fe" opacity="0.9"/>
        <circle cx="38" cy="10" r="4" fill="#f3f0ff" opacity="0.85"/>
        <ellipse cx="28" cy="50" rx="12" ry="14" fill="#6ee7b7" opacity="0.85"/>
        <circle cx="22" cy="44" r="4" fill="#a7f3d0" opacity="0.85"/>
        <ellipse cx="82" cy="42" rx="13" ry="15" fill="#93c5fd" opacity="0.85"/>
        <circle cx="88" cy="36" r="5" fill="#bfdbfe" opacity="0.85"/>
      </g>
      <text x="80" y="44">
        <tspan font-family="'Fraunces', Georgia, serif" font-size="38" font-weight="400" fill="#ffffff">Bons</tspan><tspan font-family="'DM Sans', sans-serif" font-size="34" font-weight="600" fill="#a78bfa">AI</tspan>
      </text>
    </svg>
    <div class="label">wordmark · dark</div>
  </div>

  <!-- Icon mark large -->
  <div class="cell cell-alt">
    <svg viewBox="0 0 120 120" height="96" xmlns="http://www.w3.org/2000/svg" aria-label="BonsAI icon">
      <defs>
        <linearGradient id="iconTrunk" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7048a8;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4a2878;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="40" y="88" width="40" height="8" rx="4" fill="#2d1f50" opacity="0.8"/>
      <path d="M42 96 L36 108 L84 108 L78 96 Z" fill="#1a1230"/>
      <ellipse cx="60" cy="88" rx="16" ry="5" fill="#3d2560" opacity="0.7"/>
      <path d="M58 88 Q56 70 54 52 Q52 40 55 28" stroke="url(#iconTrunk)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M54 64 Q40 55 28 46" stroke="#52c4a8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
      <path d="M56 56 Q70 46 82 38" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
      <path d="M54 42 Q38 32 26 20" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
      <ellipse cx="60" cy="28" rx="18" ry="22" fill="#f0bb70" opacity="0.85"/>
      <ellipse cx="50" cy="18" rx="12" ry="14" fill="#fbbf24" opacity="0.8"/>
      <ellipse cx="68" cy="20" rx="14" ry="16" fill="#f0bb70" opacity="0.8"/>
      <circle cx="60" cy="12" r="6" fill="#fde68a" opacity="0.9"/>
      <ellipse cx="32" cy="22" rx="14" ry="18" fill="#a78bfa" opacity="0.8"/>
      <circle cx="26" cy="14" r="5" fill="#c4b5fd" opacity="0.85"/>
      <circle cx="38" cy="10" r="4" fill="#ddd6fe" opacity="0.8"/>
      <ellipse cx="28" cy="50" rx="12" ry="14" fill="#52c4a8" opacity="0.8"/>
      <circle cx="22" cy="44" r="4" fill="#6ee7b7" opacity="0.8"/>
      <ellipse cx="82" cy="42" rx="13" ry="15" fill="#60a5fa" opacity="0.8"/>
      <circle cx="88" cy="36" r="5" fill="#93c5fd" opacity="0.8"/>
    </svg>
    <div class="label">icon mark</div>
  </div>

</div>
</body>
</html>
