<!-- @dsCard group="Colors" viewport="700x160" name="Green Scale" subtitle="Forest green primary brand palette — 11 steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:16px;font-family:var(--font-sans)}
    .row{display:flex;gap:4px}
    .sw{flex:1;display:flex;flex-direction:column;gap:5px}
    .c{height:76px;border-radius:6px}
    .n{font-size:9px;color:var(--color-text-muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .v{font-size:8px;color:var(--color-text-muted);opacity:.65;font-family:var(--font-mono)}
  </style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="c" style="background:var(--color-green-50)"></div><div class="n">green-50</div><div class="v">#edf7f0</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-100)"></div><div class="n">green-100</div><div class="v">#d8f3dc</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-200)"></div><div class="n">green-200</div><div class="v">#b7e4c7</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-300)"></div><div class="n">green-300</div><div class="v">#95d5b2</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-400)"></div><div class="n">green-400</div><div class="v">#74c69d</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-500);outline:2px solid var(--color-green-600);outline-offset:2px"></div><div class="n">green-500</div><div class="v">#52b788</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-600)"></div><div class="n">green-600 ★</div><div class="v">#40916c</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-700)"></div><div class="n">green-700</div><div class="v">#2d6a4f</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-800)"></div><div class="n">green-800</div><div class="v">#1b4332</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-900)"></div><div class="n">green-900</div><div class="v">#122b1a</div></div>
  <div class="sw"><div class="c" style="background:var(--color-green-950)"></div><div class="n">green-950</div><div class="v">#091c11</div></div>
</div>
</body>
</html>
