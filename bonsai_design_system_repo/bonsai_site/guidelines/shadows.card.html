<!-- @dsCard group="Spacing" viewport="700x200" name="Shadow System" subtitle="Warm-tinted elevation — xs through 2xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-earth-50);padding:24px;font-family:var(--font-sans)}
    .row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
    .item{display:flex;flex-direction:column;align-items:center;gap:10px}
    .box{width:80px;height:64px;background:#fff;border-radius:12px}
    .label{font-size:9px;font-family:var(--font-mono);color:var(--color-text-muted);text-align:center}
  </style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="label">shadow-xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="label">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="label">shadow-md<br>= card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="label">shadow-lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="label">shadow-xl<br>= modal</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-2xl)"></div><div class="label">shadow-2xl<br>= sheet</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-button-primary);background:var(--color-green-600)"></div><div class="label">button<br>primary</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-bonsai-glow);background:var(--color-green-100)"></div><div class="label">bonsai<br>glow</div></div>
</div>
</body>
</html>
