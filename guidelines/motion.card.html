<!-- @dsCard group="Brand" viewport="700x180" name="Motion" subtitle="Duration scale + named easing curves" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:20px;font-family:var(--font-sans)}
    .cols{display:flex;gap:32px}
    .col{flex:1}
    .col-lbl{font-size:9px;font-weight:600;color:var(--color-text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    .row{display:flex;flex-direction:column;gap:7px}
    .item{display:flex;align-items:center;gap:10px}
    .track{flex:1;height:6px;background:var(--color-border);border-radius:3px;overflow:hidden}
    .fill{height:100%;border-radius:3px;background:var(--color-green-400)}
    .lbl{font-size:9px;font-family:var(--font-mono);color:var(--color-text-secondary);min-width:80px;flex-shrink:0}
    .val{font-size:9px;color:var(--color-text-muted);min-width:44px;text-align:right;flex-shrink:0}
    .ease-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--color-border)}
    .ease-item:last-child{border-bottom:none}
    .ease-name{font-size:9px;font-family:var(--font-mono);color:var(--color-text-secondary)}
    .ease-purpose{font-size:8px;color:var(--color-text-muted);font-style:italic}
  </style>
</head>
<body>
<div class="cols">
  <div class="col">
    <div class="col-lbl">Duration</div>
    <div class="row">
      <div class="item"><div class="lbl">fast</div><div class="track"><div class="fill" style="width:8%"></div></div><div class="val">100ms</div></div>
      <div class="item"><div class="lbl">normal</div><div class="track"><div class="fill" style="width:18%"></div></div><div class="val">220ms</div></div>
      <div class="item"><div class="lbl">moderate</div><div class="track"><div class="fill" style="width:28%"></div></div><div class="val">340ms</div></div>
      <div class="item"><div class="lbl">slow</div><div class="track"><div class="fill" style="width:40%"></div></div><div class="val">480ms</div></div>
      <div class="item"><div class="lbl">growth</div><div class="track"><div class="fill" style="width:58%;background:var(--color-green-500)"></div></div><div class="val">700ms</div></div>
      <div class="item"><div class="lbl">bloom</div><div class="track"><div class="fill" style="width:100%;background:var(--color-gold-400)"></div></div><div class="val">1200ms</div></div>
    </div>
  </div>
  <div class="col">
    <div class="col-lbl">Easing</div>
    <div class="row">
      <div class="ease-item"><span class="ease-name">ease-default</span><span class="ease-purpose">standard transitions</span></div>
      <div class="ease-item"><span class="ease-name">ease-out</span><span class="ease-purpose">element entries</span></div>
      <div class="ease-item"><span class="ease-name">ease-in</span><span class="ease-purpose">element exits</span></div>
      <div class="ease-item"><span class="ease-name">ease-bounce</span><span class="ease-purpose">playful, springy</span></div>
      <div class="ease-item"><span class="ease-name">ease-growth</span><span class="ease-purpose">bonsai growth reveal</span></div>
      <div class="ease-item"><span class="ease-name">ease-elastic</span><span class="ease-purpose">achievement pop</span></div>
    </div>
  </div>
</div>
</body>
</html>
