<!-- @dsCard group="Spacing" viewport="700x160" name="Border Radius" subtitle="xs=4px through full=pill — organic, never sharp" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:20px;font-family:var(--font-sans)}
    .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
    .item{display:flex;flex-direction:column;align-items:center;gap:8px}
    .shape{background:var(--color-green-200);border:2px solid var(--color-green-400);width:56px;height:56px}
    .label{font-size:9px;font-family:var(--font-mono);color:var(--color-text-muted);text-align:center;line-height:1.3}
    .val{font-size:8px;color:var(--color-text-muted);opacity:.7;text-align:center}
  </style>
</head>
<body>
<div class="row">
  <div class="item"><div class="shape" style="border-radius:var(--radius-xs)"></div><div class="label">xs</div><div class="val">4px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-sm)"></div><div class="label">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-md)"></div><div class="label">md · input</div><div class="val">12px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-lg)"></div><div class="label">lg</div><div class="val">16px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-xl)"></div><div class="label">xl · card</div><div class="val">20px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-2xl)"></div><div class="label">2xl · modal</div><div class="val">24px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-3xl)"></div><div class="label">3xl · sheet</div><div class="val">32px</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-full);width:56px;height:28px"></div><div class="label">full · button</div><div class="val">pill</div></div>
  <div class="item"><div class="shape" style="border-radius:var(--radius-full)"></div><div class="label">full · avatar</div><div class="val">circle</div></div>
</div>
</body>
</html>
