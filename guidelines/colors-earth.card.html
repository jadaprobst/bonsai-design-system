<!-- @dsCard group="Colors" viewport="700x160" name="Earth Scale" subtitle="Warm neutral palette — bark to ivory" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:16px;font-family:var(--font-sans)}
    .row{display:flex;gap:4px}
    .sw{flex:1;display:flex;flex-direction:column;gap:5px}
    .c{height:76px;border-radius:6px;border:1px solid rgba(0,0,0,.04)}
    .n{font-size:9px;color:var(--color-text-muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .v{font-size:8px;color:var(--color-text-muted);opacity:.65;font-family:var(--font-mono)}
  </style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="c" style="background:var(--color-earth-50)"></div><div class="n">earth-50</div><div class="v">#faf6f0</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-100)"></div><div class="n">earth-100</div><div class="v">#f5eedf</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-200)"></div><div class="n">earth-200</div><div class="v">#ecddc4</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-300)"></div><div class="n">earth-300</div><div class="v">#d9bf9a</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-400)"></div><div class="n">earth-400</div><div class="v">#c4956a</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-500)"></div><div class="n">earth-500</div><div class="v">#a68262</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-600)"></div><div class="n">earth-600</div><div class="v">#8b6b4e</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-700)"></div><div class="n">earth-700</div><div class="v">#6b4f3a</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-800)"></div><div class="n">earth-800</div><div class="v">#4a3728</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-900)"></div><div class="n">earth-900 ★</div><div class="v">#2c1810</div></div>
  <div class="sw"><div class="c" style="background:var(--color-earth-950)"></div><div class="n">earth-950</div><div class="v">#1a0f08</div></div>
</div>
</body>
</html>
