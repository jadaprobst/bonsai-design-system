<!-- @dsCard group="Colors" viewport="700x120" name="Wellness States" subtitle="Five contextual wellness colors — great · good · okay · low · stressed" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--color-bg-base);padding:16px;font-family:var(--font-sans)}
    .row{display:flex;gap:8px}
    .sw{flex:1;display:flex;flex-direction:column;gap:6px}
    .c{height:56px;border-radius:10px}
    .label{font-size:var(--text-xs);font-weight:var(--font-semibold);color:var(--color-text-secondary);text-align:center}
    .token{font-size:8px;font-family:var(--font-mono);color:var(--color-text-muted);text-align:center}
  </style>
</head>
<body>
<div class="row">
  <div class="sw">
    <div class="c" style="background:var(--color-wellness-great)"></div>
    <div class="label">Amazing</div>
    <div class="token">--wellness-great</div>
  </div>
  <div class="sw">
    <div class="c" style="background:var(--color-wellness-good)"></div>
    <div class="label">Good</div>
    <div class="token">--wellness-good</div>
  </div>
  <div class="sw">
    <div class="c" style="background:var(--color-wellness-okay)"></div>
    <div class="label">Okay</div>
    <div class="token">--wellness-okay</div>
  </div>
  <div class="sw">
    <div class="c" style="background:var(--color-wellness-low)"></div>
    <div class="label">Low</div>
    <div class="token">--wellness-low</div>
  </div>
  <div class="sw">
    <div class="c" style="background:var(--color-wellness-stressed)"></div>
    <div class="label">Rough</div>
    <div class="token">--wellness-stressed</div>
  </div>
</div>
</body>
</html>
